version: "3.8"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budget_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - CONNECTION_STRING=${CONNECTION_STRING:-Host=db;Port=5432;Database=budget_app;Username=postgresql;Password=jagvillanvändaettbättrelösen}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
      - ai-bridge
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend_react:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080/api
        - VITE_BASE_PATH=/
    container_name: budget_frontend_react
    ports:
      - "3002:80"
    depends_on:
      - api
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  db:
    image: postgres:16
    container_name: budget_db
    environment:
      POSTGRES_DB: budget_app
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jagvillanvändaettbättrelösen}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgresql -d budget_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: budget_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin

networks:
  app-network:
    driver: bridge
  ai-bridge:
    external: true

volumes:
  db-data:
  pgadmin-data:
